name: Create GitHub Release
on:
  workflow_call:
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true
    outputs:
      did_release:
        description: "True if the GitHub Release occurred"
        value: ${{ jobs.check-version.outputs.should_create_tag }}

jobs:
  check-version:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      should_create_tag: ${{ steps.check_version.outputs.should_create_tag }}
      version: ${{ steps.get_version.outputs.version }}
      version_type: ${{ steps.get_version.outputs.version_type }}
      release_doc_path: ${{ steps.get_version.outputs.release_doc_path }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Install alex-c-line
        uses: alextheman231/typescript-actions/actions/safe-npm-dependency-global-install@52cf8adbb2d435944bbd882e03d0be6cdaeac243 # v1.2.1
        with:
          package-name: alex-c-line
          dependency-group: devDependencies
          strict-version-resolution: false

      - name: Fetch tags from main
        run: git fetch --tags origin

      - name: Get version, type, and release document path from package.json
        id: get_version
        run: |
          VERSION=v$(jq -r ".version" package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          RELEASE_DOC_PATH=$(alex-c-line template release-note path "$VERSION")
          echo "release_doc_path=$RELEASE_DOC_PATH" >> "$GITHUB_OUTPUT"

      - name: Check if version and release document already exists
        id: check_version
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
          RELEASE_DOC_PATH: ${{ steps.get_version.outputs.release_doc_path }}
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/$VERSION$"; then
            echo "Version $VERSION already exists, skipping tag creation..."
            echo "should_create_tag=false" >> "$GITHUB_OUTPUT"
          elif [ ! -f "$RELEASE_DOC_PATH" ]; then
            echo "No release document found. Skipping..."
            echo "should_create_tag=false" >> "$GITHUB_OUTPUT"
          else
            echo "Creating tag for $VERSION..."
            echo "should_create_tag=true" >> "$GITHUB_OUTPUT"
          fi

  create-github-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.should_create_tag == 'true'
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Fetch tags from origin
        run: |
          git fetch --unshallow origin main
          git fetch --tags origin

      - name: Get alex-up-bot GitHub token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Setup GitHub user
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --global user.name "alex-up-bot"
          git config --global user.email "alexupbot@bot.com"
          git remote set-url origin https://x-access-token:"$GITHUB_TOKEN"@github.com/"${GITHUB_REPOSITORY}".git

      - name: Create Git tag
        env:
          TAG: ${{ needs.check-version.outputs.version }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body_path: ${{ needs.check-version.outputs.release_doc_path }}
          token: ${{ steps.app-token.outputs.token }}
          tag_name: ${{ needs.check-version.outputs.version }}
          name: ${{ needs.check-version.outputs.version }}
