name: Comment outdated dependencies (Internal)

on:
  pull_request:
    branches: ["main"]

jobs:
  comment-outdated:
    uses: ./.github/workflows/audit-javascript-dependencies.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      pull-request-number: ${{ github.event.pull_request.number }}
      APP_ID: ${{ vars.ALEX_UP_BOT_APP_ID }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.ALEX_UP_BOT_PRIVATE_KEY }}
