name: Version Change CI

on:
  workflow_call:

permissions:
  contents: read

jobs:
  version-change-ci:
    if: ${{ github.head_ref == 'alex-up-bot/change-major-version' || github.head_ref == 'alex-up-bot/change-minor-version' || github.head_ref == 'alex-up-bot/change-patch-version' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install alex-c-line
        uses: alextheman231/typescript-actions/actions/safe-npm-dependency-global-install@8701899e25ea05979ebb0c89da71c4ebd6c3911d # v1.2.3
        with:
          package-name: alex-c-line
          dependency-group: devDependencies
          strict-version-resolution: false

      - name: Get the version number from package.json
        id: get_current_version
        run: |
          VERSION=v$(jq -r ".version" package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get path to release document
        env:
          VERSION: ${{ steps.get_current_version.outputs.version }}
        id: release_document_path
        run: |
          RELEASE_DOC_PATH=$(alex-c-line template release-note path "$VERSION")
          echo "release_doc_path=$RELEASE_DOC_PATH" >> "$GITHUB_OUTPUT"

      - name: Verify the release document is valid
        env:
          RELEASE_DOC_PATH: ${{ steps.release_document_path.outputs.release_doc_path }}
        run: alex-c-line template release-note check "$RELEASE_DOC_PATH" --expected-release-status Released
