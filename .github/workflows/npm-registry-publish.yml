name: Publish to NPM Registry

permissions:
  id-token: write

on:
  workflow_call:
    inputs:
      node-version:
        description: The Node version to use
        type: string
        required: false
        default: "22"
    outputs:
      did_publish:
        description: "True if a publish occurred"
        value: ${{ jobs.check-version.outputs.should_publish }}

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check_version.outputs.should_publish }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Fetch from main
        run: git fetch --unshallow origin main

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: https://registry.npmjs.org/

      - name: Get package data from package.json
        id: get_package_data
        run: |
          NAME=$(jq -r '.name' package.json)
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

          VERSION=v$(jq -r ".version" package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version already exists
        id: check_version
        env:
          NAME: ${{ steps.get_package_data.outputs.name }}
          VERSION: ${{ steps.get_package_data.outputs.version }}
        run: |
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "Version $VERSION already exists, skipping publish..."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing $VERSION..."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'true'
    steps:
      - name: Checkout the repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Use PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: https://registry.npmjs.org/
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build package
        run: pnpm run build

      - name: Publish to NPM
        run: pnpm publish --access public
