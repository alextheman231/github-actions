name: Create change request

on:
  workflow_call:
    secrets:
      APP_PRIVATE_KEY:
        description: The private key for alex-up-bot
        required: true
    inputs:
      APP_ID:
        description: The app ID for alex-up-bot
        type: string
        required: true
      actor:
        description: The one requesting the change
        type: string
        required: true
      reason:
        description: A short explanation for the reason behind the change.
        type: string
        required: true
      description:
        description: A further description of the change.
        type: string
        required: false
        default: Redeploy the project
      branch_name:
        description: The branch name (after being prefixed with alex-up-bot)
        type: string
        required: false
        default: change-request
      node-version:
        description: The Node version to use
        type: string
        required: false
        default: "22"

jobs:
  create-change-request:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install alex-c-line
        uses: alextheman231/typescript-actions/actions/safe-npm-dependency-global-install@26b0740613ab8196b5ed71ae9ef9c394f4f9a564 # v1.2.4
        with:
          package-name: alex-c-line
          dependency-group: devDependencies
          strict-version-resolution: false

      - name: Get project name
        id: project_name
        run: |
          PROJECT_NAME=$(jq -r ".name" package.json)
          echo "name=$PROJECT_NAME" >> "$GITHUB_OUTPUT"

      - name: Create the change request
        id: change_request
        env:
          PROJECT_NAME: ${{ steps.project_name.outputs.name }}
          REASON: ${{ inputs.reason }}
          DESCRIPTION: ${{ inputs.description }}
          ACTOR: ${{ inputs.actor }}
        run: |
          CHANGE_REQUEST_PATH=$(alex-c-line template change-request create --project-name "$PROJECT_NAME" --reason "$REASON" --description "$DESCRIPTION" --requested-by "$ACTOR")
          echo "path=$CHANGE_REQUEST_PATH" >> "$GITHUB_OUTPUT"

      - name: Get alex-up-bot GitHub token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ inputs.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          author: alex-up-bot <alexupbot@bot.com>
          committer: alex-up-bot <alexupbot@bot.com>
          commit-message: |
            ${{ inputs.reason }}

            ${{ inputs.description }}
          branch: alex-up-bot/${{ inputs.branch_name }}
          base: main
          title: ${{ inputs.reason }}
          body-path: ${{ steps.change_request.outputs.path }}
