name: Create pull request templates

on:
  workflow_call:
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true
    inputs:
      run-build:
        type: boolean
        default: true
      node-version:
        description: The Node version to use
        type: string
        required: false
        default: "22"

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pull-request-templates:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup GitHub user
        run: |
          git config --global user.name "alex-up-bot"
          git config --global user.email "alexupbot@bot.com"

      - name: Use PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: "pnpm"

      - name: Install alex-c-line
        uses: alextheman231/typescript-actions/actions/safe-npm-dependency-global-install@26b0740613ab8196b5ed71ae9ef9c394f4f9a564 # v1.2.4
        with:
          package-name: alex-c-line
          dependency-group: devDependencies
          strict-version-resolution: false

      - name: Install dependencies
        run: pnpm install

      - name: Run build
        if: ${{ inputs.run-build }}
        run: pnpm run build

      - name: Create pull request templates
        run: alex-c-line template pull-request create

      - name: Get alex-up-bot GitHub token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          author: alex-up-bot <alexupbot@bot.com>
          committer: alex-up-bot <alexupbot@bot.com>
          branch: alex-up-bot/update-pull-request-templates
          base: main
          commit-message: Update pull request templates
          title: "Update pull request templates"
          body-path: .github/PULL_REQUEST_TEMPLATE/documentation_change.md
