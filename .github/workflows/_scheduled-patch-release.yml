name: Scheduled Patch Release (Internal)

on:
  workflow_dispatch:
  schedule:
    - cron: 0 21 1 * *

jobs:
  scheduled-patch-release:
    permissions:
      contents: write
    uses: ./.github/workflows/scheduled-patch-release.yml
    secrets:
      APP_ID: ${{ vars.ALEX_UP_BOT_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.ALEX_UP_BOT_PRIVATE_KEY }}
