name: End-to-end Node Package CI

on:
  workflow_call:
    inputs:
      os:
        description: "The operating systems to run the workflow on"
        required: false
        default: '["ubuntu-latest", "macos-latest"]'
        type: string

permissions:
  contents: read

jobs:
  end-to-end-ci-steps:
    if: ${{ github.head_ref != 'alex-up-bot/change-major-version' && github.head_ref != 'alex-up-bot/change-minor-version' && github.head_ref != 'alex-up-bot/change-patch-version' }}
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Use PNPM
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          run_install: false

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Run end-to-end tests
        run: pnpm run test-end-to-end

  end-to-end-ci:
    needs: end-to-end-ci-steps
    runs-on: ubuntu-latest
    if: always()
    env:
      CI_STATUS: ${{ needs.end-to-end-ci-steps.result }}
    steps:
      - name: Report on any matrix failures
        run: |
          if [ "$CI_STATUS" == "failure" ] || [ "$CI_STATUS" == "cancelled" ]; then
            exit 1
          fi
